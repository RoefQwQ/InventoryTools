name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  INTERNAL_NAME: InventoryTools
  CONFIGURATION: Release
  DOTNET_CLI_TELEMETRY_OPTOUT: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1.3

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev\"
          Remove-Item latest.zip

      - name: Restore
        run: dotnet restore InventoryTools

      - name: Build
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore ${{ env.INTERNAL_NAME }}

      - name: Get current date
        id: date
        run: |
          $dateStr = Get-Date -Format 'yyyy-MM-dd-HHmm'
          $dateNum = Get-Date -Format 'yyyyMMdd'
          echo "date=$dateStr" >> $env:GITHUB_OUTPUT
          echo "dateNum=$dateNum" >> $env:GITHUB_OUTPUT

      - name: Update repo.json LastUpdate
        shell: pwsh
        run: |
          $repoJson = Get-Content "repo.json" -Raw | ConvertFrom-Json
          $repoJson[0].LastUpdate = [int]"${{ steps.date.outputs.dateNum }}"
          $repoJson | ConvertTo-Json -Depth 10 | Set-Content "repo.json" -Encoding UTF8

      - name: Commit repo.json update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add repo.json
          git diff --cached --quiet || git commit -m "chore: Update repo.json LastUpdate to ${{ steps.date.outputs.dateNum }}"
          git push origin main

      - name: Delete old latest release
        uses: dev-drprasad/delete-tag-and-release@v1.0
        with:
          tag_name: latest
          delete_release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Wait for deletion
        shell: pwsh
        run: Start-Sleep -Seconds 10

      - name: Create Release with GitHub CLI
        shell: pwsh
        run: |
          $date = "${{ steps.date.outputs.date }}"
          $zipPath = "InventoryTools\bin\Release\InventoryTools\latest.zip"
          
          # Create release using GitHub CLI with "latest" tag
          gh release create "latest" `
            --title "Build $date" `
            --notes "Automated build from main branch at $date" `
            --target main `
            "$zipPath"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            InventoryTools\bin\Release\InventoryTools
