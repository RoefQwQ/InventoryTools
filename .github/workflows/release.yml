name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  INTERNAL_NAME: InventoryTools
  CONFIGURATION: Release
  DOTNET_CLI_TELEMETRY_OPTOUT: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1.3

      - name: Download Dalamud
        run: |
          $devPath = "$env:LOCALAPPDATA\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Force -Path $devPath | Out-Null
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$devPath\"
          Remove-Item latest.zip

      - name: Restore
        run: dotnet restore InventoryTools

      - name: Build
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore ${{ env.INTERNAL_NAME }}

      - name: Get current date
        id: date
        run: echo "date=$(Get-Date -Format 'yyyy-MM-dd-HHmm')" >> $env:GITHUB_OUTPUT

      - name: Create Release with GitHub CLI
        shell: pwsh
        run: |
          $date = "${{ steps.date.outputs.date }}"
          $zipPath = "InventoryTools\bin\Release\InventoryTools\latest.zip"
          
          # Create release using GitHub CLI
          gh release create "$date" `
            --title "Build $date" `
            --notes "Automated build from main branch at $date" `
            --target main `
            "$zipPath"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            InventoryTools\bin\Release\InventoryTools
