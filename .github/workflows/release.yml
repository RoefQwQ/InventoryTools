name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  INTERNAL_NAME: InventoryTools
  CONFIGURATION: Release
  DOTNET_CLI_TELEMETRY_OPTOUT: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1.3

      - name: Download Dalamud
        run: |
          $devPath = "$env:LOCALAPPDATA\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Force -Path $devPath | Out-Null
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$devPath\"
          Remove-Item latest.zip

      - name: Restore
        run: dotnet restore InventoryTools

      - name: Build
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore ${{ env.INTERNAL_NAME }}

      - name: Get current date
        id: date
        run: echo "date=$(Get-Date -Format 'yyyy-MM-dd-HHmm')" >> $env:GITHUB_OUTPUT

      - name: Delete old latest release
        uses: dev-drprasad/delete-tag-and-release@v1.0
        with:
          tag_name: latest
          delete_release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Wait for deletion
        shell: pwsh
        run: Start-Sleep -Seconds 10

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build (${{ steps.date.outputs.date }})"
          files: |
            InventoryTools\bin\Release\InventoryTools\latest.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            InventoryTools\bin\Release\InventoryTools
