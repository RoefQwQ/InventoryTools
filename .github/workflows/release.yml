name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        submodules: true

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Download Dalamud SDK
      shell: pwsh
      run: |
        $out = "${{ github.workspace }}\dalamud"
        New-Item -ItemType Directory -Force -Path $out | Out-Null
        Invoke-WebRequest -Uri "https://github.com/goatcorp/dalamud-distrib/raw/main/latest.zip" `
          -OutFile "$out\dalamud.zip"
        Expand-Archive -Path "$out\dalamud.zip" -DestinationPath $out -Force
        Remove-Item "$out\dalamud.zip"
        echo "DALAMUD_HOME=$out" >> $env:GITHUB_ENV

    - name: Restore dependencies
      run: dotnet restore InventoryTools/InventoryTools.csproj

    - name: Build
      run: dotnet build InventoryTools/InventoryTools.csproj --configuration Release --no-restore

    - name: Locate plugin zip
      id: find_zip
      shell: pwsh
      run: |
        $zip = Get-ChildItem -Path "InventoryTools/bin/Release" -Recurse -Filter "latest.zip" |
          Select-Object -First 1
        if (-not $zip) {
          Write-Host "Contents of InventoryTools/bin/Release:"
          Get-ChildItem "InventoryTools/bin/Release" -Recurse | Select-Object FullName | Format-List
          throw "Could not find latest.zip under InventoryTools/bin/Release -- DalamudPackager may not have run."
        }
        Write-Host "Found zip: $($zip.FullName)"
        echo "ZIP_PATH=$($zip.FullName)" >> $env:GITHUB_OUTPUT

    - name: Parse version from tag
      id: version
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        $ver = $tag.TrimStart('v')
        $parts = $ver.Split('.')
        while ($parts.Count -lt 4) { $parts += '0' }
        $full = $parts -join '.'
        echo "SHORT=$ver"   >> $env:GITHUB_OUTPUT
        echo "FULL=$full"   >> $env:GITHUB_OUTPUT

    - name: Rename zip for release
      id: rename_zip
      shell: pwsh
      run: |
        $src  = "${{ steps.find_zip.outputs.ZIP_PATH }}"
        $dest = Join-Path (Split-Path $src) "InventoryTools.zip"
        Rename-Item $src $dest
        Write-Host "Renamed to: $dest"
        echo "RELEASE_ZIP=$dest" >> $env:GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: "InventoryTools ${{ steps.version.outputs.SHORT }}"
        body: |
          ### InventoryTools ${{ steps.version.outputs.SHORT }}

          **安装：** 在 Dalamud 中添加自定义仓库地址，然后安装「InventoryTools」。
          **更新：** 在 Dalamud 插件安装器中点击更新按钮。
        files: ${{ steps.rename_zip.outputs.RELEASE_ZIP }}
        fail_on_unmatched_files: true

    - name: Trigger DalamudPlugins update
      uses: peter-evans/repository-dispatch@v3
      with:
        token: ${{ secrets.REPO_SYNC_TOKEN }}
        repository: RoefQwQ/DalamudPlugins
        event-type: update-plugin
        client-payload: '{"version": "${{ steps.version.outputs.FULL }}", "tag": "${{ github.ref_name }}"}'
