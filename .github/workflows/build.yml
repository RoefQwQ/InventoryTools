name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Restore dependencies
      run: dotnet restore InventoryTools.sln
      
    - name: Build
      run: dotnet build InventoryTools.sln --configuration Release --no-restore
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: InventoryTools-build
        path: |
          InventoryTools/bin/Release/**/InventoryTools.dll
          InventoryTools/bin/Release/**/InventoryTools.json
        retention-days: 7
